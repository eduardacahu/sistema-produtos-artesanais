<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sistema de Produtos Artesanais</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- CSS próprio -->
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f8f9fa;
        }

        header {
            background-color: #6f42c1;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #e9ecef;
            padding: 10px;
            text-align: center;
        }

        footer {
            background-color: #6f42c1;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 30px;
        }

        .container-box {
            background: white;
            padding: 20px;
            border-radius: 10px;
            margin-top: 20px;
        }

        table th, table td {
            border: 1px solid #000;
            padding: 8px;
        }

        table {
            border-collapse: collapse;
            width: 100%;
        }

        @media (max-width: 768px) {
            input {
                width: 100%;
                margin-bottom: 10px;
            }
        }
    </style>
</head>

<body>

    <!-- HEADER -->
    <header>
        <h1>Sistema de Produtos Artesanais</h1>
    </header>

    <!-- NAV -->
    <nav>
        Cadastro e gerenciamento de produtos
    </nav>

    <!-- MAIN -->
    <main class="container">

        <!-- FORMULÁRIO -->
        <div class="container-box">
            <h2>Cadastrar Produto</h2>

            <form id="form-produto" class="row g-3">
                <div class="col-md-3">
                    <input type="text" id="nome" class="form-control" placeholder="Nome">
                </div>

                <div class="col-md-3">
                    <input type="text" id="categoria" class="form-control" placeholder="Categoria">
                </div>

                <div class="col-md-2">
    <input type="number" id="estoque" class="form-control" placeholder="Estoque">
</div>

<div class="col-md-2">
    <select id="ativo" class="form-control">
        <option value="1">Ativo</option>
        <option value="0">Inativo</option>
    </select>
</div>

<div class="col-md-2">
    <button type="submit" class="btn btn-primary w-100">Salvar</button>
</div>

        <!-- TABELA -->
        <div class="container-box">
            <h2>Lista de Produtos</h2>

            <table>
                <thead>
                    <tr>
                        <th>Nome</th>
                        <th>Categoria</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Ações</th>
                    </tr>
                </thead>

                <tbody id="tabela-produtos">
                </tbody>
            </table>
        </div>

    </main>

    <!-- FOOTER -->
    <footer>
        Projeto Full Stack - Eduarda
    </footer>

    <!-- JS -->
    <script>
document.addEventListener("DOMContentLoaded", () => {
    carregarProdutos();
});

async function carregarProdutos() {
    const resposta = await fetch("php/produtos/listar.php");
    const dados = await resposta.json();

    const tabela = document.getElementById("tabela-produtos");

    tabela.innerHTML = "";

    dados.data.forEach(p => {
        tabela.innerHTML += `
            <tr>
                <td>${p.nome}</td>
                <td>${p.categoria}</td>
                <td>R$ ${p.preco}</td>
                <td>${p.estoque}</td>
                <td>
                    <button class="btn btn-danger btn-sm" onclick="excluirProduto(${p.id})">Excluir</button>
                </td>
            </tr>
        `;
    });
}

document.getElementById("form-produto").addEventListener("submit", async function(e) {
    e.preventDefault();

    const nome = document.getElementById("nome").value;
    const categoria = document.getElementById("categoria").value;
    const preco = document.getElementById("preco").value;
    const estoque = document.getElementById("estoque").value;
    const ativo = document.getElementById("ativo").value;

    const resposta = await fetch("php/produtos/inserir.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            nome,
            categoria,
            preco,
            estoque,
            ativo
        })
    });

    const resultado = await resposta.json();

    alert(resultado.message);

    document.getElementById("form-produto").reset();

    carregarProdutos();
});

async function excluirProduto(id) {
    if (!confirm("Deseja excluir este produto?")) {
        return;
    }

    const resposta = await fetch("php/produtos/excluir.php", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({ id: id })
    });

    const resultado = await resposta.json();

    alert(resultado.message);

    carregarProdutos();
}
</script>
</body>
</html>
